apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: web-container
        image: nginx:latest
        ports:
        - containerPort: 80

        env:
        - name: ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: ENV

        - name: PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: password

        volumeMounts:
        - name: storage
          mountPath: /usr/share/nginx/html

        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: nfs-pvc
